{% extends "base1.html" %}

{% block body %}
<!-- Doctor Login Section -->
<section id="doctor-login" class="doctor-login section" style="margin-top: 50px;">

  <!-- Section Title -->
  <div class="container section-title text-center" data-aos="fade-up">
    <h2>Doctor Login</h2>
  </div><!-- End Section Title -->

  <div class="container" data-aos="fade-up" data-aos-delay="100">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-8">
        <div class="card shadow p-4 rounded-3">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" id="username" class="form-control" name="username" placeholder="Enter Username" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control" name="password" placeholder="Enter Password" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success" style="background-color: #dc9b7d; border-color: #dc9b7d; color: white;">Login as Doctor</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</section><!-- /Doctor Login Section -->
{% endblock body %}
